server:
  port: 8080

spring:
  application:
    name: water-ai-consultant
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/water_ai_consultant}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 3000
  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

app:
  storage:
    type: ${STORAGE_TYPE:local}
    local-root: ${STORAGE_PATH:${LOCAL_STORAGE_ROOT:./storage}}
    minio:
      endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:water-ai-consultant}
  llm:
    provider: ${LLM_PROVIDER:mock}
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
      max-tokens: ${DEEPSEEK_MAX_TOKENS:2048}
  embedding:
    provider: ${EMBEDDING_PROVIDER:mock}
    base-url: ${EMBEDDING_BASE_URL:}
    api-key: ${EMBEDDING_API_KEY:}
    model: ${EMBEDDING_MODEL:text-embedding-3-small}
    dimension: ${EMBEDDING_DIMENSION:1536}
  vector:
    provider: ${VECTOR_PROVIDER:pgvector}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

logging:
  pattern:
    level: "%5p [trace_id:%X{traceId:-}]"
