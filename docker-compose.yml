services:
  postgres:
    image: postgres:16-alpine
    container_name: water-ai-consultant-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-water_ai_consultant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-water_ai_consultant}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: water-ai-consultant-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    restart: "no"

  water-ai-consultant-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: water-ai-consultant-server
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-water_ai_consultant}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-water_ai_consultant}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_PATH: ${STORAGE_PATH:-/app/storage}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-water-ai-consultant}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      VECTOR_PROVIDER: ${VECTOR_PROVIDER:-pgvector}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./storage:${STORAGE_PATH:-/app/storage}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: "no"

  water-ai-consultant-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: water-ai-consultant-web
    depends_on:
      water-ai-consultant-server:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: "no"

volumes:
  postgres_data:
  minio_data:
